<!doctype html>
<html lang="id"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin JuaStore</title><link rel="stylesheet" href="app.css"></head><body>
<div class="wrap">
<section id="loginBox" class="card login">
  <div class="brand"><div class="logo">JS</div><div><h2>Admin JuaStore</h2><p>Masuk menggunakan Firebase Authentication</p></div></div>
  <div class="field"><label>Email</label><input id="email" type="email"></div><br>
  <div class="field"><label>Password</label><input id="password" type="password"></div>
  <div class="actions"><button id="loginBtn">Masuk</button></div><div id="loginMsg" class="notice hidden"></div>
</section>

<main id="app" class="hidden">
<header class="top"><div class="brand"><div class="logo">JS</div><div><h2>JuaStore Admin Pro</h2><small>Order & Garansi</small></div></div><button id="logoutBtn" class="secondary">Keluar</button></header>
<section class="grid">
 <div class="card stat">Total Order<strong id="statTotal">0</strong></div>
 <div class="card stat">Garansi Aktif<strong id="statActive">0</strong></div>
 <div class="card stat">Garansi Habis<strong id="statExpired">0</strong></div>
 <div class="card stat">Pendapatan<strong id="statRevenue">Rp0</strong></div>
</section>

<section class="card">
<h3 id="formTitle">Tambah Pesanan</h3>
<div class="formgrid">
 <div class="field"><label>ID Order</label><input id="orderId" readonly placeholder="Dibuat otomatis saat disimpan"></div>
 <div class="field"><label>Nama Customer *</label><input id="customerName"></div>
 <div class="field"><label>Nomor WhatsApp *</label><input id="whatsapp" inputmode="numeric" placeholder="628xxxx"></div>
 <div class="field"><label>Produk *</label><input id="product"></div>
 <div class="field"><label>Harga *</label><input id="price" type="number" min="0"></div>
 <div class="field"><label>Tanggal Order *</label><input id="orderDate" type="date"></div>
 <div class="field"><label>Durasi Produk</label><input id="duration" placeholder="1 bulan"></div>
 <div class="field"><label>Garansi (hari) *</label><input id="warrantyDays" type="number" min="0" value="30"></div>
 <div class="field"><label>Metode Pembayaran</label><select id="payment"><option>DANA</option><option>GoPay</option><option>QRIS</option><option>Lainnya</option></select></div>
</div>
<div class="actions"><button id="saveBtn">Simpan Pesanan</button><button id="cancelBtn" class="secondary hidden">Batal Edit</button></div>
<div id="formMsg" class="notice hidden"></div>
</section>

<section class="card">
<div class="top"><div><h3>Data Pesanan</h3><small>Cari berdasarkan ID, nama, WhatsApp, atau produk</small></div><input id="filter" placeholder="Cari..." style="max-width:340px"></div>
<div class="tablewrap"><table><thead><tr><th>ID</th><th>Customer</th><th>WhatsApp</th><th>Produk</th><th>Harga</th><th>Tanggal</th><th>Garansi</th><th>Aksi</th></tr></thead><tbody id="rows"></tbody></table></div>
</section>
</main></div>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script><script src="admin.js"></script></body></html>
